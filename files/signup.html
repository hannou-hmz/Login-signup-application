<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    <form action="/signup" method="post">
        <label for="username">Username</label>
        <input name="username" id="username" type="text" placeholder="enter username" required><br><br>

        <label for="email">Email </label>
        <input name="email" id="email" type="email" placeholder="enter a valid email" required><br><br>

        <label for="pw">Password</label>
        <input name="password" id="pw" type="password" placeholder="enter password" required><br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
    
</body>
</html>
