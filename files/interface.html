<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Media Test Interface</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f0f2f5;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1877f2;
    color:white;
    padding:12px 20px;
}

.logo{
    font-size:20px;
    font-weight:bold;
}

.logout-btn{
    background:#ff4d4d;
    border:none;
    padding:8px 14px;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.logout-btn:hover{
    background:#e60000;
}

/* Main container */
.container{
    width:500px;
    margin:30px auto;
}

/* Post box */
.post{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.username{
    font-weight:bold;
    margin-bottom:5px;
}

.content{
    color:#444;
}

.actions{
    margin-top:10px;
}

.actions button{
    margin-right:10px;
    border:none;
    background:#eee;
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
}

.actions button:hover{
    background:#ddd;
}
</style>

</head>
<body>

<div class="navbar">
    <div class="logo">MySocial</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

    <div class="post">
        <div class="username">Alice</div>
        <div class="content">Just finished learning JavaScript sessions! 🚀</div>
        <div class="actions">
            <button>Like</button>
            <button>Comment</button>
        </div>
    </div>

    <div class="post">
        <div class="username">Bob</div>
        <div class="content">Node.js + MongoDB is actually fun.</div>
        <div class="actions">
            <button>Like</button>
            <button>Comment</button>
        </div>
    </div>

    <div class="post">
        <div class="username">Charlie</div>
        <div class="content">Working on a new project today.</div>
        <div class="actions">
            <button>Like</button>
            <button>Comment</button>
        </div>
    </div>

</div>

<script>
function logout(){
    alert('You have been logged out!');
    window.location.href = '/logout';
}
</script>

</body>
</html>
